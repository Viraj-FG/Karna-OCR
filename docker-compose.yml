services:
  karna-ocr:
    build: .
    image: karna-ocr:latest
    ports:
      - "8080:8080"    # Document API
      - "8000:8000"    # vLLM model API (optional, for direct access)
    environment:
      - VLLM_PORT=8000
      - API_PORT=8080
      - TENSOR_PARALLEL=1         # Set to 2 for dual-GPU
      - MAX_MODEL_LEN=4096
      - GPU_MEM_UTIL=0.92
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1              # Set to 2 for dual-GPU
              capabilities: [gpu]
    volumes:
      - karna-logs:/app/logs
    restart: unless-stopped

volumes:
  karna-logs:
